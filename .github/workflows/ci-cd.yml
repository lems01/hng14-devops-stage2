name: CI/CD Pipeline

on:
  push:
    branches: ["*"]

env:
  REGISTRY: localhost:5000

permissions:
  contents: read
  security-events: write

jobs:

# ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: |
          pip install flake8
          npm install -g eslint@8
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint

      - name: Run flake8
        run: flake8 api

      - name: Run eslint
        run: |
          cd frontend
          npm install
          eslint .

      - name: Run hadolint
        run: |
          ./hadolint api/Dockerfile
          ./hadolint worker/Dockerfile
          ./hadolint frontend/Dockerfile

# ---------------- TEST ----------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov httpx
          pip install -r api/requirements.txt

      - name: Run pytest
        run: |
          cd api
          PYTHONPATH=. pytest --cov=. --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build images with cache
        run: |
          SHA=${{ github.sha }}

          docker pull $REGISTRY/api:latest || true

          docker build \
            --cache-from=$REGISTRY/api:latest \
            -t $REGISTRY/api:$SHA \
            -t $REGISTRY/api:latest api

          docker build -t $REGISTRY/worker:$SHA -t $REGISTRY/worker:latest worker
          docker build -t $REGISTRY/frontend:$SHA -t $REGISTRY/frontend:latest frontend

      - name: Push images
        run: |
          docker push $REGISTRY/api:${{ github.sha }}
          docker push $REGISTRY/api:latest
          docker push $REGISTRY/worker:${{ github.sha }}
          docker push $REGISTRY/worker:latest
          docker push $REGISTRY/frontend:${{ github.sha }}
          docker push $REGISTRY/frontend:latest

# ---------------- SECURITY ----------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Rebuild images
        run: |
          docker build -t api:latest api
          docker build -t worker:latest worker
          docker build -t frontend:latest frontend

      - name: Scan API
        run: |
          trivy image --format sarif \
            -o api.sarif \
            --severity CRITICAL \
            --exit-code 1 \
            api:latest

      - name: Upload API SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: api.sarif

# ---------------- INTEGRATION ----------------
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d

      - name: Run integration script
        run: |
          timeout 60s bash scripts/integration.sh

      - name: Teardown stack
        if: always()
        run: docker compose down

# ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d

      - name: Rolling update check
        run: |
          API_CONTAINER=$(docker compose ps -q api)

          for i in {1..12}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' $API_CONTAINER 2>/dev/null || echo "starting")
            echo "Health: $STATUS"

            if [ "$STATUS" = "healthy" ]; then
              echo "Deployment successful"
              exit 0
            fi

            sleep 5
          done

          echo "Deployment failed"
          exit 1