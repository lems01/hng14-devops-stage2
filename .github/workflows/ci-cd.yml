name: CI/CD Pipeline

on:
  push:
    branches: [ "*" ]

jobs:

# ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: |
          pip install flake8
          npm install -g eslint@8
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint

      - name: Lint Python
        run: flake8 api

      - name: Lint JS
        run: |
          cd frontend
          npm install
          eslint .

      - name: Lint Dockerfiles
        run: |
          ./hadolint api/Dockerfile
          ./hadolint worker/Dockerfile
          ./hadolint frontend/Dockerfile

# ---------------- TEST ----------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install pytest pytest-cov httpx
          pip install -r api/requirements.txt

      - name: Run tests
        run: |
          cd api
          pytest --cov=. --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          SHA=${{ github.sha }}

          docker build -t localhost:5000/api:$SHA api
          docker build -t localhost:5000/worker:$SHA worker
          docker build -t localhost:5000/frontend:$SHA frontend

          docker tag localhost:5000/api:$SHA localhost:5000/api:latest
          docker tag localhost:5000/worker:$SHA localhost:5000/worker:latest
          docker tag localhost:5000/frontend:$SHA localhost:5000/frontend:latest

          docker push localhost:5000/api:$SHA
          docker push localhost:5000/worker:$SHA
          docker push localhost:5000/frontend:$SHA

          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:latest
          docker push localhost:5000/frontend:latest

# ---------------- SECURITY SCAN ----------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build images again
        run: |
          docker build -t api:latest api
          docker build -t worker:latest worker
          docker build -t frontend:latest frontend
      
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan images
        run: |
          trivy image --severity CRITICAL --exit-code 1 api:latest
          trivy image --severity CRITICAL --exit-code 1 worker:latest
          trivy image --severity CRITICAL --exit-code 1 frontend:latest

# ---------------- INTEGRATION TEST ----------------
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: |
          docker compose up -d
          sleep 10

      - name: Test flow
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)

          for i in {1..10}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed"
              exit 0
            fi
            sleep 2
          done

          echo "Job did not complete"
          exit 1

      - name: Teardown
        if: always()
        run: docker compose down

# ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Rolling update simulation
        run: |
          docker compose up -d

          # Wait for new container health
          for i in {1..12}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker ps -q | head -n1))
            if [ "$STATUS" = "healthy" ]; then
              echo "New container healthy"
              exit 0
            fi
            sleep 5
          done

          echo "Health check failed, aborting"
          exit 1
