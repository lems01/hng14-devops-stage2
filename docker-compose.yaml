version: "3.9"

services:

  redis:
    image: redis:7-alpine
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  api:
    build: ./api
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    networks:
      - app-network
    ports:
      - "${API_PORT}:8000"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  worker:
    build: ./worker
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  frontend:
    build: ./frontend
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: ${API_URL}
    networks:
      - app-network
    ports:
      - "${FRONTEND_PORT}:3000"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

networks:
  app-network:
    driver: bridge
